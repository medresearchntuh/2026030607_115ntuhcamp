                </a>
            );
        };

        const CourseSection = ({ title, icon, courses, defaultExpanded = true }) => {
            const [expanded, setExpanded] = useState(defaultExpanded);
            return (
                <div className="bg-white rounded-2xl shadow-card border border-gray-100 overflow-hidden mb-4">
                    <div 
                        className="p-4 flex justify-between items-center cursor-pointer active:bg-gray-50 transition-colors"
                        onClick={() => setExpanded(!expanded)}
                    >
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-[#f4eff6] text-[#5e4a6f] flex items-center justify-center">
                                <Icon name={icon} size={20} />
                            </div>
                            <h3 className="font-bold text-gray-800 text-[15px]">{title}</h3>
                        </div>
                        <div className={`text-gray-400 transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <Icon name="ChevronDown" size={20} />
                        </div>
                    </div>
                    
                    <div className={`transition-all duration-300 ease-in-out ${expanded ? 'max-h-[3000px] opacity-100 border-t border-gray-100' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                        <div className="p-4 space-y-4 bg-gray-50/50">
                            {courses.map((course, idx) => (
                                <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                                    <div className="flex justify-between items-start mb-2">
                                        <div className="text-xs font-bold text-[#5e4a6f] bg-[#f4eff6] px-2.5 py-1 rounded-md">{course.date}</div>
                                        {course.tms !== "無" && (
                                            <a href={`https://edu.ntuh.gov.tw/course/${course.tms}`} target="_blank" rel="noopener noreferrer" className="text-[11px] font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded-md hover:bg-blue-100 transition-colors flex items-center gap-1">
                                                TMS {course.tms} <Icon name="ExternalLink" size={10} />
                                            </a>
                                        )}
                                    </div>
                                    <h4 className="font-bold text-gray-800 text-base mb-2 leading-relaxed">{course.topic}</h4>
                                    <div className="flex flex-col gap-1.5 mt-2 pt-2 border-t border-gray-100">
                                        <div className="flex items-center gap-2 text-xs text-gray-600">
                                            <Icon name="User" size={14} className="text-gray-400" />
                                            <span className="font-medium">{course.speaker}</span>
                                        </div>
                                        <div className="flex items-center gap-2 text-xs text-gray-500">
                                            <Icon name="MapPin" size={14} className="text-gray-400" />
                                            <span>{course.unit}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 頂部標題列 ---
        const TopBar = () => (
            <div className="bg-white sticky top-0 z-50 px-5 py-3.5 shadow-sm border-b border-gray-100 flex items-center justify-between">
                <div className="flex items-center gap-3">
                    <img src="https://i.meee.com.tw/AAiaMSR.png" alt="Logo" className="w-9 h-9 object-contain" />
                    <div className="flex flex-col">
                        <span className="text-[10px] text-gray-500 font-bold tracking-widest uppercase mb-0.5">臺大醫療體系</span>
                        <span className="text-[15px] font-bold text-[#5e4a6f] leading-none">115年度研究營</span>
                    </div>
                </div>
            </div>
        );

        // --- 頁面: 首頁 ---
        const HomeView = ({ onChangeTab }) => (
            <div className="p-5 pt-6 pb-6 space-y-5 animate-enter">
                {/* 緊湊版 Hero Block，包含活動對象 */}
                <div className="bg-[#5e4a6f] rounded-3xl p-5 text-white shadow-card relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-white rounded-full blur-[60px] opacity-10 -mr-10 -mt-10"></div>
                    
                    {/* 活動圓滿結束 Badge */}
                    <div className="inline-flex items-center gap-1.5 px-3 py-1 bg-green-500/20 text-green-100 rounded-full text-xs font-bold mb-4 border border-green-400/30">
                        <Icon name="Star" size={14} /> 活動圓滿結束
                    </div>

                    <h2 className="text-[20px] font-bold mb-4 leading-snug relative z-10">
                        115年度臺大醫療體系<br/>
                        <span className="text-[#d3b4d3]">新進主治醫師與醫事人員研究營</span>
                    </h2>
                    
                    <div className="bg-white/10 rounded-2xl p-4 space-y-3 backdrop-blur-sm border border-white/10 relative z-10">
                        {/* 整合：活動對象 */}
                        <div className="flex items-start gap-3">
                            <Icon name="Users" size={16} className="text-[#d3b4d3] shrink-0 mt-0.5" />
                            <div className="text-[13px] text-gray-200 leading-relaxed font-medium">
                                總、分院一年內新進主治醫師與醫事科部推薦具研究潛力之醫事研究人員
                            </div>
                        </div>
                    </div>
                </div>

                {/* 快捷按鈕 (活動結束後的情境) */}
                <div className="grid grid-cols-3 gap-3">
                    <a href="https://medresearchntuh.github.io/20260307_115ntuhcampsurvey/" target="_blank" rel="noopener noreferrer" className="bg-[#5e4a6f] py-4 px-2 rounded-2xl shadow-card flex flex-col items-center justify-center gap-2 active:scale-[0.98] transition-all text-white hover:bg-[#4a3a58]">
                        <div className="w-11 h-11 rounded-full bg-white/20 flex items-center justify-center">
                            <Icon name="FileText" size={22} />
                        </div>
                        <span className="font-bold text-sm whitespace-nowrap">填寫滿意度</span>
                    </a>
                    <button onClick={() => onChangeTab('post')} className="bg-white py-4 px-2 rounded-2xl shadow-card border border-gray-100 flex flex-col items-center justify-center gap-2 active:scale-[0.98] transition-all">
                        <div className="w-11 h-11 rounded-full bg-[#f4eff6] text-[#5e4a6f] flex items-center justify-center">
                            <Icon name="Download" size={22} />
                        </div>
                        <span className="font-bold text-gray-800 text-sm">會後資料</span>
                    </button>
                    <button onClick={() => onChangeTab('resources')} className="bg-white py-4 px-2 rounded-2xl shadow-card border border-gray-100 flex flex-col items-center justify-center gap-2 active:scale-[0.98] transition-all">
                        <div className="w-11 h-11 rounded-full bg-[#f4eff6] text-[#5e4a6f] flex items-center justify-center">
                            <Icon name="Grid" size={22} />
                        </div>
                        <span className="font-bold text-gray-800 text-sm">研究資源</span>
                    </button>
                </div>

                {/* 簡單聯絡資訊 */}
                <div className="bg-gray-100 rounded-2xl p-5 text-center mt-2">
                    <div className="text-xs font-bold text-gray-500 mb-2">主辦單位：台大醫院醫學研究部</div>
                    <div className="text-xs text-gray-400">承辦人：陳巧瑜管理師 (分機 263254)</div>
                </div>
            </div>
        );


        // --- 頁面: 會後 ---
        const PostTripView = () => (
            <div className="p-5 pt-6 pb-6 animate-enter space-y-4">
                {/* 滿意度調查 */}
                <div className="bg-white rounded-2xl shadow-card border border-gray-50 p-5 flex items-center justify-between transition-transform active:scale-[0.99]">
                    <div className="flex items-center gap-4">
                        <div className="w-12 h-12 rounded-full bg-[#f4eff6] text-[#5e4a6f] flex items-center justify-center shrink-0">
                            <Icon name="FileText" size={22} />
                        </div>
                        <div>
                            <h4 className="font-bold text-gray-800 text-sm mb-0.5">活動滿意度調查</h4>
                            <p className="text-[11px] text-gray-400">協助我們辦得更好</p>
                        </div>
                    </div>
                    <a href="https://medresearchntuh.github.io/20260307_115ntuhcampsurvey/" target="_blank" className="px-5 py-2.5 bg-[#5e4a6f] text-white text-xs font-bold rounded-xl shadow-sm hover:bg-[#4a3a58] transition-colors whitespace-nowrap">
                        前往填寫
                    </a>
                </div>

                {/* 照片與講義下載 (Grid Layout) */}
                <div className="grid grid-cols-2 gap-4 pt-2">
                    {/* 照片 */}
                    <div className="bg-white rounded-2xl shadow-card p-5 border border-gray-50 flex flex-col items-center text-center">
                        <div className="w-14 h-14 bg-[#f4eff6] rounded-full flex items-center justify-center mb-3 text-[#5e4a6f] shadow-inner">
                            <Icon name="Camera" size={24} />
                        </div>
                        <h4 className="font-bold text-gray-800 text-sm mb-1">活動照片下載</h4>
                        <p className="text-[10px] text-gray-400 mb-4">2周工作天上傳</p>
                        <button disabled className="w-full py-2.5 bg-gray-100 text-gray-400 rounded-xl text-xs font-bold cursor-not-allowed">
                            尚未開放
                        </button>
                    </div>

                    {/* 講義 */}
                    <div className="bg-white rounded-2xl shadow-card p-5 border border-gray-50 flex flex-col items-center text-center">
                        <div className="w-14 h-14 bg-[#f4eff6] rounded-full flex items-center justify-center mb-3 text-[#5e4a6f] shadow-inner">
                            <Icon name="BookOpen" size={24} />
                        </div>
                        <h4 className="font-bold text-gray-800 text-sm mb-1">活動講義下載</h4>
                        <p className="text-[10px] text-gray-400 mb-4">2周工作天上傳</p>
                        <button disabled className="w-full py-2.5 bg-gray-100 text-gray-400 rounded-xl text-xs font-bold cursor-not-allowed">
                            尚未開放
                        </button>
                    </div>
                </div>
            </div>
        );

        // 7. 更多資源 (Resources View)
        const ResourcesView = () => {
            const [subTab, setSubTab] = useState('research'); // research, courses, suao
            // nested tab for research
            const [researchSubTab, setResearchSubTab] = useState('services'); // services, researchers

            return (
                <div className="pb-6 pt-6 animate-enter min-h-screen">
                    <div className="sticky top-[60px] z-30 bg-[#f8f9fc]/95 backdrop-blur-md px-5 py-3">
                        <div className="flex bg-gray-200/80 p-1 rounded-xl shadow-inner mb-3">
                            <button onClick={() => setSubTab('research')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all duration-300 ${subTab === 'research' ? 'bg-white text-[#5e4a6f] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>研究資源</button>
                            <button onClick={() => setSubTab('courses')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all duration-300 ${subTab === 'courses' ? 'bg-white text-[#5e4a6f] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>線上課程</button>
                            <button onClick={() => setSubTab('suao')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all duration-300 ${subTab === 'suao' ? 'bg-white text-[#5e4a6f] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>蘇澳觀光</button>
                        </div>
                        
                        {subTab === 'research' && (
                            <div className="flex justify-center mb-1">
                                <div className="inline-flex bg-gray-100 p-0.5 rounded-lg">
                                    <button 
                                        onClick={() => setResearchSubTab('services')} 
                                        className={`px-4 py-1.5 text-xs font-medium rounded-md transition-all ${researchSubTab === 'services' ? 'bg-white text-[#5e4a6f] shadow-sm' : 'text-gray-500'}`}
                                    >
                                        研究服務
                                    </button>
                                    <button 
                                        onClick={() => setResearchSubTab('researchers')} 
                                        className={`px-4 py-1.5 text-xs font-medium rounded-md transition-all ${researchSubTab === 'researchers' ? 'bg-white text-[#5e4a6f] shadow-sm' : 'text-gray-500'}`}
                                    >
                                        共研研究員
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="px-5 pb-5">
                        {subTab === 'research' && (
                            <div className="animate-enter space-y-3">
                                {researchSubTab === 'services' ? (
                                    RESEARCH_SERVICES_DATA.map((srv, idx) => (
                                        <div key={idx} className="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 flex items-start gap-4">
                                            <div className="w-10 h-10 bg-[#f4eff6] rounded-full text-[#5e4a6f] flex items-center justify-center shrink-0">
                                                <Icon name={srv.icon} size={20} />
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-gray-800 text-[15px] mb-1.5 leading-snug">{srv.title}</h4>
                                                <p className="text-xs text-gray-500 leading-relaxed mb-3 whitespace-pre-line">{srv.desc}</p>
                                                <div className="flex flex-wrap gap-1.5">
                                                    {srv.offices.map((off, k) => (
                                                        <span key={k} className="text-[10px] font-bold bg-gray-100 text-gray-600 px-2 py-1 rounded-md">{off}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    RESEARCHERS_DATA.map((researcher, idx) => (
                                        <div key={idx} className="bg-white rounded-2xl shadow-card border border-gray-50 p-5 hover:shadow-md transition-shadow">
                                            <div className="flex items-start gap-4">
                                                <div className="w-12 h-12 bg-[#f4eff6] rounded-full flex items-center justify-center shrink-0 text-[#5e4a6f] font-bold text-lg border border-[#f4eff6]">
                                                    {researcher.name[0]}
                                                </div>
                                                <div className="flex-1">
                                                    <a 
                                                        href="https://www.ntuh.gov.tw/LARD/Fpage.action?muid=5826&fid=6344" 
                                                        target="_blank" 
                                                        rel="noopener noreferrer"
                                                        className="inline-flex items-center gap-1 font-bold text-lg text-[#5e4a6f] hover:underline decoration-[#d3b4d3] underline-offset-2 mb-1"
                                                    >
                                                        {researcher.name} <Icon name="ExternalLink" size={14} className="opacity-70" />
                                                    </a>
                                                    <div className="text-sm font-medium text-gray-500 mb-2">{researcher.title}</div>
                                                    
                                                    <div className="space-y-2 mt-3">
                                                        <div className="flex gap-2">
                                                            <span className="text-xs font-bold text-[#8e7b9f] shrink-0 mt-0.5">專長：</span>
                                                            <span className="text-xs text-gray-600 leading-relaxed">{researcher.specialty}</span>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <span className="text-xs font-bold text-gray-400 shrink-0 mt-0.5">服務：</span>
                                                            <span className="text-xs text-gray-500 leading-relaxed">{researcher.service}</span>
                                                        </div>
                                                        <div className="flex gap-2 pt-1 border-t border-gray-50 mt-1">
                                                            <Icon name="MapPin" size={12} className="text-blue-400 mt-0.5" />
                                                            <span className="text-xs text-blue-500 font-medium">{researcher.office}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {subTab === 'courses' && (
                            <div className="animate-enter space-y-4">
                                <CourseSection 
                                    title="生成式 AI 輔助寫作課程" 
                                    icon="Video" 
                                    courses={COURSES_DATA} 
                                    defaultExpanded={true}
                                />
                                <CourseSection 
                                    title="論文與期刊投稿" 
                                    icon="FileText" 
                                    courses={JOURNAL_COURSES_DATA} 
                                    defaultExpanded={false} 
                                />
                            </div>
                        )}

                        {subTab === 'suao' && (
                            <div className="animate-enter space-y-5">
                                {/* 懶人包卡片 */}
                                <div className="bg-gradient-to-br from-[#5e4a6f] to-[#8e7b9f] rounded-3xl p-6 text-white shadow-card relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white rounded-full blur-[50px] opacity-10"></div>
                                    <h3 className="font-bold text-xl mb-3 flex items-center gap-2 relative z-10">
                                        <Icon name="Star" size={20} className="text-yellow-300" /> 蘇澳一日遊
                                    </h3>
                                    <p className="text-sm text-white/90 leading-relaxed relative z-10 font-medium">
                                        體驗全球唯二的冷泉，走訪粉鳥林、內埤情人灣等絕美海景，並大啖番割田甕缸雞、南方澳新鮮海鮮。推薦順遊蠟筆城堡、計程車博物館等親子觀光工廠。
                                    </p>
                                    <div className="mt-4 pt-4 border-t border-white/20 flex items-center gap-2 text-xs text-white/80 relative z-10 font-bold">
                                        <Icon name="Bus" size={16} /> 建議交通：火車至蘇澳站或客運至蘇澳服務區
                                    </div>
                                </div>

                                {/* 景點清單 */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-gray-50 px-4 py-3 border-b border-gray-100 flex items-center gap-2">
                                        <Icon name="Utensils" size={18} className="text-orange-500" />
                                        <h3 className="font-bold text-gray-800">精選美食</h3>
                                    </div>
                                    <div className="p-4 space-y-1">
                                        <PlaceItem title="番割田甕缸雞" desc="號稱宜蘭最好吃，交流道旁" />
                                        <PlaceItem title="阿芬鮮魚湯" desc="南方澳知名新鮮魚湯" />
                                        <PlaceItem title="海珍活海鮮餐廳" desc="漁港道地熱炒" />
                                        <PlaceItem title="南方澳無名蝦餅蚵嗲" desc="酥脆排隊蝦餅" />
                                        <PlaceItem title="義珍香烘焙坊" desc="爆漿饅頭、吐司" />
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-gray-50 px-4 py-3 border-b border-gray-100 flex items-center gap-2">
                                        <Icon name="Camera" size={18} className="text-green-500" />
                                        <h3 className="font-bold text-gray-800">必訪景點</h3>
                                    </div>
                                    <div className="p-4 space-y-1">
                                        <PlaceItem title="粉鳥林秘境" desc="夢幻藍寶石海灣" />
                                        <PlaceItem title="內埤海灘情人灣" desc="絕美沙灘，適合看海放空" />
                                        <PlaceItem title="南方澳觀景台" desc="俯瞰南方澳漁港全景" />
                                        <PlaceItem title="蘇澳冷泉公園" desc="世界奇泉，夏天消暑" />
                                        <PlaceItem title="蜡藝蠟筆城堡" desc="彩繪DIY，親子熱門" />
                                        <PlaceItem title="計程車博物館" desc="主題特色博物館" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- 主程式 & 底部實體導航 ---
        const App = () => {
            const [tab, setTab] = useState('home');

            return (
                <div className="min-h-screen bg-[#f8f9fc] font-sans text-[#333333] pb-24">
                    <TopBar />
                    
                    <main className="max-w-md mx-auto relative">
                        {tab === 'home' && <HomeView onChangeTab={setTab} />}
                        {tab === 'post' && <PostTripView />}
                        {tab === 'resources' && <ResourcesView />}
                    </main>

                    {/* 頁尾資訊 */}
                    <footer className="max-w-md mx-auto text-center text-[11px] text-gray-400 pb-8 pt-4 font-medium">
                        系統設計：台大醫院總院醫學研究部 陳巧瑜管理師
                    </footer>

                    {/* Solid Bottom Navigation Bar (變成 3 個按鈕) */}
                    <div className="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-200 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
                        <nav className="max-w-md mx-auto flex justify-between items-center px-4 py-1.5 h-[64px]">
                            <NavButton active={tab === 'home'} onClick={() => setTab('home')} icon="Home" label="首頁" />
                            <NavButton active={tab === 'post'} onClick={() => setTab('post')} icon="Download" label="會後" />
                            <NavButton active={tab === 'resources'} onClick={() => setTab('resources')} icon="Grid" label="資源" />
                        </nav>
                    </div>
                </div>
            );
        };

        const NavButton = ({ active, onClick, icon, label }) => (
            <button 
                onClick={onClick} 
                className={`flex flex-col items-center justify-center w-[30%] h-12 rounded-xl transition-all duration-200 ${active ? 'bg-[#f4eff6] text-[#5e4a6f]' : 'text-gray-400 hover:bg-gray-50'}`}
            >
                <div className={`transition-transform duration-200 ${active ? 'scale-110 mb-0.5' : 'scale-100'}`}>
                    <Icon name={icon} size={active ? 22 : 20} />
                </div>
                <span className={`text-[10px] ${active ? 'font-bold' : 'font-medium'}`}>{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
